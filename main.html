<!DOCTYPE html>
<html>

<head>
	<title>Car Insurance Registration</title>
</head>

<body>

	<form method="post">

		<!-- Name -->
		<label for="name">Name:</label>
		<input type="text" id="name" required>
		<br><br>

		<!-- Email -->
		<label for="email">Email:</label>
		<input type="email" id="email" required>
		<br><br>

		<!-- Gender -->
		<label>Gender:</label>
		<input type="radio" id="gender_m" name="gender" required>
		<label for="gender_m">Male</label>

		<input type="radio" id="gender_f" name="gender" required>
		<label for="gender_f">Female</label>
		<br><br>

		<!-- Car Brands -->
		<label for="cars">Car Brands:</label>
		<select id="cars">
			<option>BMW</option>
			<option>Audi</option>
			<option>Mercedez</option>
		</select>
		<br><br>

		<!-- Car Age -->
		<label for="carage">Car Age:</label>
		<input type="number" id="carage" required>
		<br><br>

		<!-- Date of Purchase -->
		<label for="dop">Date of Purchase:</label>
		<input type="date" id="dop" required>
		<br><br>

		<!-- Password -->
		<label for="password">Password:</label>
		<input type="password" id="password" required>
		<br><br>

		<!-- Submit -->
		<button type="submit">Submit</button>

	</form>

</body>

</html>
